name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip files folder
        run: zip -r files.zip files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            data.json
            stats.json
            files.zip
